<body>
<p>Esta página se ha movido. <a href="/condiciones/queratocono/">Haz clic aquí si no eres redirigido automáticamente.</a></p>
<div class="cta-block" style="background:#f0faf0;border:2px solid #1a5632;border-radius:8px;padding:1.5rem;margin:2rem 0">
  <p style="font-family:Georgia,serif;font-size:1.1rem;color:#1a5632;text-align:center;margin-bottom:.8rem">
    <strong>Zeaxan</strong> — Solicita información
  </p>
  <form action="#" method="POST" style="max-width:400px;margin:0 auto">
    <input type="hidden" name="product" value="zeaxan">
    <input type="hidden" name="source" value="zeaxan.pe">
    <input type="hidden" name="condition" value="queratocono">
    <input type="text" name="name" placeholder="Tu nombre" required
      style="width:100%;padding:10px;margin-bottom:8px;border:1px solid #ddd;border-radius:6px;font-size:.95rem;box-sizing:border-box">
    <input type="tel" name="phone" placeholder="Tu teléfono" required
      style="width:100%;padding:10px;margin-bottom:8px;border:1px solid #ddd;border-radius:6px;font-size:.95rem;box-sizing:border-box">
    <input type="text" name="city" placeholder="Ciudad"
      style="width:100%;padding:10px;margin-bottom:12px;border:1px solid #ddd;border-radius:6px;font-size:.95rem;box-sizing:border-box">
    <button type="submit"
      style="width:100%;padding:12px;background:#1a5632;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:bold;cursor:pointer">
      Solicitar Información →
    </button>
  </form>
  <p style="font-family:Arial,sans-serif;font-size:.72rem;color:#888;text-align:center;margin-top:.6rem">
